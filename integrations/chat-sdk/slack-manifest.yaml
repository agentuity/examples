display_information:
  name: "{YOUR_BOT_NAME}"
  description: A bot built with Chat SDK and Agentuity
  background_color: "#07272D"

features:
  bot_user:
    display_name: "{YOUR_BOT_NAME}"
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - reactions:read
      - reactions:write
      - users:read

settings:
  event_subscriptions:
    request_url: "{YOUR_WEBHOOK_URL}/api/webhooks/slack"
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - reaction_added
  interactivity:
    is_enabled: true
    request_url: "{YOUR_WEBHOOK_URL}/api/webhooks/slack"
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
