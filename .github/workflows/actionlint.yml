name: Actionlint

on:
  pull_request:
    paths:
      - '.github/actionlint.yaml'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - '.github/actionlint.yaml'
      - '.github/workflows/**'

permissions:
  contents: read

env:
  GITHUB_TOKEN: ''

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca
